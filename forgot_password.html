<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Import Font Englebert dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Englebert&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Englebert', sans-serif;
        }

        body {
            background-color: #0A2647; /* Navy Blue sebagai warna dasar paling belakang */
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 1. Sidebar Kiri (Kosong tanpa logo & nama) */
        .sidebar {
            width: 20%;
            min-width: 220px;
            background-color: #0A2647; /* Navy Blue */
        }

        /* 2. Kawasan Utama Kanan (Latar Belakang Orange Berbucu Melengkung) */
        .main-content {
            flex: 1;
            background-color: #FC9D01; /* Orange Utama */
            border-top-left-radius: 30px; /* Bucu melengkung di atas kiri */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 3. Kad Borang Forgot Password */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            padding: 32px 32px 24px 32px;
            text-align: center;
        }

        .icon-container {
            width: 50px;
            height: 50px;
            background-color: #0A2647; /* Navy Blue */
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            font-size: 24px;
        }

        h2 {
            color: #0A2647;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #555555;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 16px;
            color: #0A2647;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus {
            border-color: #0A2647;
            box-shadow: 0 0 0 3px rgba(10, 38, 71, 0.1);
        }

        .button-group {
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Englebert', sans-serif;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-cancel {
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            color: #6c757d;
        }

        .btn-cancel:hover {
            background-color: #f8f9fa;
        }

        .btn-reset {
            background-color: #0A2647;
            border: none;
            color: #ffffff;
        }

        .btn-reset:hover {
            background-color: #071c35;
        }

        /* Responsif untuk skrin telefon */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                display: none; /* Sorok sidebar terus pada skrin telefon untuk jimat ruang */
            }
            .main-content {
                border-top-left-radius: 0px; /* Buang lengkungan pada mobile supaya penuh skrin */
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Bahagian Kiri: Sidebar Navy Blue (Kosong) -->
    <div class="sidebar"></div>

    <!-- Bahagian Kanan: Ruang Kandungan Orange (Berbucu Melengkung) -->
    <div class="main-content">
        
        <!-- Kad Forgot Password -->
        <div class="card">
            <div class="icon-container">?</div>
            
            <h2>Forgot password?</h2>
            <p>No worries, we'll send you reset instructions.</p>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <input type="email" id="email" name="email" value="putrisyakirah@gmail.com" required placeholder="Enter your email">
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-reset">Reset password</button>
                </div>
            </form>
        </div>

    </div>

</body>
</html>
